<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1A1A2E"/>
      <stop offset="100%" style="stop-color:#2D1B69"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD700"/>
      <stop offset="100%" style="stop-color:#DAA520"/>
    </linearGradient>
    <linearGradient id="skin" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E8C39E"/>
      <stop offset="100%" style="stop-color:#D4A574"/>
    </linearGradient>
    <linearGradient id="robe" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2C2C3E"/>
      <stop offset="100%" style="stop-color:#1A1A2E"/>
    </linearGradient>
  </defs>

  <!-- خلفية دائرية -->
  <circle cx="200" cy="195" r="190" fill="url(#bg)"/>
  <circle cx="200" cy="195" r="180" fill="none" stroke="#673DE6" stroke-width="2.5"/>

  <!-- الجسم والثوب -->
  <path d="M130 260 Q120 320 110 380 L290 380 Q280 320 270 260 Z" fill="url(#robe)"/>
  
  <!-- البشت (العباءة) -->
  <path d="M115 250 Q100 270 95 310 Q140 330 200 335 Q260 330 305 310 Q300 270 285 250 Z" fill="none" stroke="#DAA520" stroke-width="3" opacity="0.6"/>
  <path d="M115 250 Q110 260 108 270" fill="none" stroke="#DAA520" stroke-width="2.5" opacity="0.6"/>
  <path d="M285 250 Q290 260 292 270" fill="none" stroke="#DAA520" stroke-width="2.5" opacity="0.6"/>
  
  <!-- حافة البشت الذهبية -->
  <path d="M115 250 Q200 270 285 250" fill="none" stroke="#FFD700" stroke-width="2.5" opacity="0.4"/>

  <!-- الرقبة -->
  <rect x="185" y="210" width="30" height="45" rx="8" fill="url(#skin)"/>

  <!-- الرأس -->
  <ellipse cx="200" cy="180" rx="45" ry="50" fill="url(#skin)"/>

  <!-- اللحية -->
  <path d="M165 195 Q175 235 200 250 Q225 235 235 195" fill="#2C2C3E"/>
  <path d="M170 200 Q180 230 200 240 Q220 230 230 200" fill="#3A3A4E"/>

  <!-- الشارب -->
  <path d="M175 180 Q190 188 200 183" fill="#2C2C3E" stroke="none"/>
  <path d="M225 180 Q210 188 200 183" fill="#2C2C3E" stroke="none"/>

  <!-- الفم -->
  <path d="M192 190 Q200 194 208 190" fill="none" stroke="#8B6B4A" stroke-width="1.5"/>

  <!-- الأنف -->
  <path d="M198 172 L195 180 Q200 183 205 180 L202 172" fill="#D4A574" stroke="none"/>

  <!-- العيون -->
  <ellipse cx="183" cy="168" rx="6" ry="5" fill="white"/>
  <ellipse cx="217" cy="168" rx="6" ry="5" fill="white"/>
  <circle cx="183" cy="168" r="3.5" fill="#2C2C3E"/>
  <circle cx="217" cy="168" r="3.5" fill="#2C2C3E"/>
  <circle cx="182" cy="166" r="1.2" fill="white" opacity="0.8"/>
  <circle cx="216" cy="166" r="1.2" fill="white" opacity="0.8"/>

  <!-- الحاجبان (عبوس الحكيم) -->
  <path d="M174 160 Q183 156 190 160" fill="none" stroke="#2C2C3E" stroke-width="2" stroke-linecap="round"/>
  <path d="M226 160 Q217 156 210 160" fill="none" stroke="#2C2C3E" stroke-width="2" stroke-linecap="round"/>

  <!-- العمامة -->
  <ellipse cx="200" cy="142" rx="48" ry="20" fill="#FFFFFF"/>
  <ellipse cx="200" cy="135" rx="50" ry="25" fill="#F0F0F0"/>
  <ellipse cx="200" cy="130" rx="45" ry="18" fill="#FFFFFF"/>
  
  <!-- طبقات العمامة -->
  <path d="M155 135 Q160 120 200 115 Q240 120 245 135" fill="#E8E8E8" stroke="none"/>
  <path d="M158 130 Q170 118 200 113 Q230 118 242 130" fill="#F5F5F5" stroke="none"/>
  
  <!-- ذيل العمامة -->
  <path d="M245 130 Q255 140 262 160 Q265 175 260 185" fill="none" stroke="#F0F0F0" stroke-width="6" stroke-linecap="round"/>
  <path d="M245 130 Q258 142 264 162 Q267 178 260 186" fill="none" stroke="#FFFFFF" stroke-width="4" stroke-linecap="round"/>

  <!-- قاعدة العمامة الذهبية -->
  <path d="M152 135 Q165 130 200 128 Q235 130 248 135" fill="none" stroke="#DAA520" stroke-width="2"/>

  <!-- اليد اليمنى (حاملة الكتاب) -->
  <path d="M270 260 Q285 270 295 290 Q298 298 290 300" fill="url(#skin)" stroke="none"/>
  
  <!-- اليد اليسرى (حاملة الكتاب) -->
  <path d="M130 260 Q115 270 105 290 Q102 298 110 300" fill="url(#skin)" stroke="none"/>

  <!-- الكتاب المفتوح -->
  <rect x="130" y="275" width="60" height="45" rx="3" fill="#8B4513" transform="rotate(-8 160 297)"/>
  <rect x="210" y="275" width="60" height="45" rx="3" fill="#8B4513" transform="rotate(8 240 297)"/>
  <rect x="135" y="278" width="55" height="39" rx="2" fill="#FFF8DC" transform="rotate(-8 162 297)"/>
  <rect x="210" y="278" width="55" height="39" rx="2" fill="#FFF8DC" transform="rotate(8 237 297)"/>
  
  <!-- خطوط الكتاب -->
  <line x1="140" y1="290" x2="183" y2="288" stroke="#8B4513" stroke-width="1" opacity="0.4" transform="rotate(-8 160 297)"/>
  <line x1="140" y1="296" x2="183" y2="294" stroke="#8B4513" stroke-width="1" opacity="0.4" transform="rotate(-8 160 297)"/>
  <line x1="140" y1="302" x2="183" y2="300" stroke="#8B4513" stroke-width="1" opacity="0.4" transform="rotate(-8 160 297)"/>
  <line x1="215" y1="290" x2="258" y2="288" stroke="#8B4513" stroke-width="1" opacity="0.4" transform="rotate(8 237 297)"/>
  <line x1="215" y1="296" x2="258" y2="294" stroke="#8B4513" stroke-width="1" opacity="0.4" transform="rotate(8 237 297)"/>
  <line x1="215" y1="302" x2="258" y2="300" stroke="#8B4513" stroke-width="1" opacity="0.4" transform="rotate(8 237 297)"/>

  <!-- غلاف الكتاب (وسط) -->
  <rect x="192" y="272" width="16" height="50" rx="2" fill="#A0522D"/>

  <!-- أيقونة العلم/المعرفة فوق الكتاب -->
  <circle cx="200" cy="290" r="3" fill="#FFD700" opacity="0.3"/>
  <circle cx="200" cy="285" r="4" fill="#FFD700" opacity="0.15"/>

  <!-- نص الجهبذ -->
  <text x="200" y="350" text-anchor="middle" font-family="Traditional Arabic, Scheherazade New, Arial" font-size="38" font-weight="bold" fill="url(#gold)">الجهبذ</text>
  <text x="200" y="374" text-anchor="middle" font-family="Arial" font-size="12" fill="#00B4D8" letter-spacing="4" font-weight="600">AL-JEHABIZ</text>
</svg>
