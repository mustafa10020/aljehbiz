<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1A1A2E"/>
      <stop offset="100%" style="stop-color:#2D1B69"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD700"/>
      <stop offset="100%" style="stop-color:#FFA500"/>
    </linearGradient>
  </defs>

  <!-- خلفية الدرع -->
  <circle cx="200" cy="200" r="190" fill="url(#bg)"/>
  <circle cx="200" cy="200" r="180" fill="none" stroke="#673DE6" stroke-width="3"/>

  <!-- جسم البومة -->
  <ellipse cx="200" cy="230" rx="70" ry="80" fill="#4A4A5A"/>
  <ellipse cx="200" cy="240" rx="50" ry="55" fill="#5C5C6E"/>

  <!-- ريش البومة -->
  <path d="M160 200 Q200 260 240 200" fill="#6B6B80" stroke="#4A4A5A" stroke-width="2"/>

  <!-- رأس البومة -->
  <circle cx="200" cy="160" r="55" fill="#5C5C6E"/>

  <!-- عيون البومة -->
  <circle cx="178" cy="155" r="22" fill="#FFD700"/>
  <circle cx="222" cy="155" r="22" fill="#FFD700"/>
  <circle cx="178" cy="155" r="12" fill="#1A1A2E"/>
  <circle cx="222" cy="155" r="12" fill="#1A1A2E"/>
  <circle cx="174" cy="150" r="4" fill="white" opacity="0.7"/>
  <circle cx="218" cy="150" r="4" fill="white" opacity="0.7"/>

  <!-- حاجبان (نظرة ثاقبة) -->
  <line x1="160" y1="135" x2="185" y2="142" stroke="#FFD700" stroke-width="3" stroke-linecap="round"/>
  <line x1="240" y1="135" x2="215" y2="142" stroke="#FFD700" stroke-width="3" stroke-linecap="round"/>

  <!-- منقار -->
  <polygon points="200,170 190,182 210,182" fill="#E67E22"/>

  <!-- الشماغ الأحمر -->
  <path d="M160 185 Q200 195 240 185 L245 220 Q200 240 155 220 Z" fill="#C0392B"/>
  <path d="M165 190 Q200 200 235 190" fill="none" stroke="white" stroke-width="1.5" opacity="0.5"/>
  <path d="M170 195 Q200 205 230 195" fill="none" stroke="white" stroke-width="1.5" opacity="0.5"/>

  <!-- أجنحة -->
  <path d="M135 210 Q110 250 120 290 Q130 280 145 260" fill="#4A4A5A"/>
  <path d="M265 210 Q290 250 280 290 Q270 280 255 260" fill="#4A4A5A"/>

  <!-- العدسة المكبرة (في الجناح الأيمن) -->
  <circle cx="270" cy="270" r="30" fill="none" stroke="#00B4D8" stroke-width="4"/>
  <circle cx="270" cy="270" r="28" fill="#00B4D8" opacity="0.1"/>
  <line x1="292" y1="292" x2="310" y2="310" stroke="#00B4D8" stroke-width="5" stroke-linecap="round"/>

  <!-- نص الجهبذ -->
  <text x="200" y="345" text-anchor="middle" font-family="Traditional Arabic, Arial" font-size="36" font-weight="bold" fill="#FFD700">الجهبذ</text>
  <text x="200" y="368" text-anchor="middle" font-family="Arial" font-size="12" fill="#00B4D8" letter-spacing="3">AL-JEHABIZ</text>
</svg>
