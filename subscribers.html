<!DOCTYPE html><html lang="ar" dir="rtl"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>المشتركون - النشرة القانونية</title><meta name="robots" content="noindex,nofollow"><link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;800&display=swap" rel="stylesheet"><style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:'Cairo',sans-serif;background:#f8f9fa;color:#0d1b2a;line-height:1.8;padding:2rem 1rem}.container{max-width:700px;margin:0 auto;background:#fff;border-radius:20px;padding:2rem;box-shadow:0 10px 40px rgba(0,0,0,.08)}h1{font-size:1.5rem;color:#c8a44e;text-align:center;margin-bottom:.3rem}.sub{text-align:center;color:#888;font-size:.9rem;margin-bottom:1.5rem;padding-bottom:1rem;border-bottom:2px solid #f0f0f0}.count{text-align:center;font-size:1.1rem;margin-bottom:1.5rem}.count span{color:#c8a44e;font-weight:900;font-size:1.8rem}.list{display:flex;flex-direction:column;gap:.6rem}.item{display:flex;justify-content:space-between;align-items:center;padding:.8rem 1rem;background:#f8f9fa;border-radius:10px;font-size:.95rem}.item .email{font-weight:700;color:#0a1628}.item .date{color:#888;font-size:.8rem}.empty{text-align:center;color:#aaa;padding:3rem 0;font-size:1.1rem}.footer{text-align:center;margin-top:2rem;color:#aaa;font-size:.85rem}.footer a{color:#c8a44e;text-decoration:none;font-weight:700}.loading{text-align:center;padding:3rem;color:#888}</style></head><body><div class="container"><h1>📩 المشتركون في النشرة القانونية</h1><p class="sub">الجهبذ للخدمات والاستشارات</p><div id="count" class="count"><span id="num">0</span> مشترك</div><div id="list" class="list"><p class="loading">جاري التحميل...</p></div><p class="footer"><a href="https://mustafa10020.github.io/aljehbiz/">← العودة للرئيسية</a></p></div><script>
(function(){fetch('https://raw.githubusercontent.com/mustafa10020/aljehbiz/master/subscribers.json?t='+Date.now()).then(function(r){return r.json()}).then(function(d){
var list=document.getElementById('list'),num=document.getElementById('num');
var subs=d.subscribers||[];num.textContent=subs.length;
if(subs.length===0){list.innerHTML='<p class="empty">لا يوجد مشتركون بعد</p>';return;}
var html='';for(var i=subs.length-1;i>=0;i--){var s=subs[i];html+='<div class="item"><span class="email">'+s.email+'</span><span class="date">'+s.date.slice(0,10)+'</span></div>';}
list.innerHTML=html;}).catch(function(){document.getElementById('list').innerHTML='<p class="empty">تعذر تحميل البيانات</p>';});
})();
</script></body></html>
