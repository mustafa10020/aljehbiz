name: Sync Subscribers
on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:
permissions:
  contents: write
jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Fetch subscribers from jsonblob
        run: |
          curl -s --fail "https://jsonblob.com/api/jsonBlob/019f6825-033f-7eaf-8bed-fa4b914c607c" -o subscribers.json || echo "[]" > subscribers.json
      - name: Commit if changed
        run: |
          if [ -f subscribers.json ]; then
            git config user.name "aljehbiz-bot"
            git config user.email "bot@aljehbiz.com"
            git add subscribers.json
            if ! git diff --cached --quiet; then
              git commit -m "sync: update subscribers"
              git push
            fi
          fi
