name: Sync Subscribers
on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:
jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Fetch from jsonblob
        run: |
          curl -s "https://jsonblob.com/api/jsonBlob/019f6825-033f-7eaf-8bed-fa4b914c607c" -o subscribers.json
      - name: Commit if changed
        run: |
          git config user.name "aljehbiz-bot"
          git config user.email "bot@aljehbiz.com"
          git add subscribers.json
          git diff --cached --quiet || git commit -m "sync: تحديث بيانات المشتركين"
          git push
